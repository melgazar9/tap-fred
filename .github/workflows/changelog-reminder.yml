name: FRED API Changelog Reminder

on:
  schedule:
    - cron: '0 9 1 * *' # Monthly, 1st day at 9 AM UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Check for existing open reminder
        id: existing
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'api-changelog-check',
              state: 'open',
              per_page: 1
            });
            core.setOutput('exists', issues.length > 0 ? 'true' : 'false');

      - name: Create reminder issue
        if: steps.existing.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              `## Monthly FRED API Check`,
              ``,
              `This is an automated reminder to check for Federal Reserve Economic Data (FRED) API changes.`,
              ``,
              `### Resources to Check:`,
              `- **FRED API Documentation**: https://fred.stlouisfed.org/docs/api/`,
              `- **fredapi GitHub Releases**: https://github.com/mortada/fredapi/releases`,
              ``,
              `### What to Look For:`,
              `- New API endpoints or parameters`,
              `- New economic data series available`,
              `- Deprecated endpoints or fields`,
              `- Breaking changes in data formats`,
              `- Rate limit or authentication changes`,
              `- New data categories or classifications`,
              ``,
              `### If Changes Found:`,
              `1. Document the changes in a comment on this issue`,
              `2. Comment \`/analyze-changes\` to trigger Claude AI analysis`,
              `3. Review and merge the auto-generated PR`,
              ``,
              `**Note**: FRED maintains an official API with documented changes. Check both the official API docs and the Python wrapper library.`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Monthly Check] FRED API Changes — ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['api-changelog-check']
            });
